<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Resource Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="website-title">DevResources</h1>
            <nav>
                <a href="#resources">All Resources</a>
                <a href="#favorites">Favorites</a>
            </nav>
            <div class="search-container">
                <input type="text" id="search-bar" placeholder="Search resources...">
            </div>
        </div>
    </header>

    <main>
        <section id="trending-resources">
            <h2>Trending Tools</h2>
            <div class="trending-container">
                <!-- Trending cards will be injected by JavaScript -->
            </div>
        </section>

        <section id="categories">
            <h2>Categories</h2>
            <div class="category-filters">
                <!-- Category filters will be injected by JavaScript -->
            </div>
        </section>

        <section id="tutorials">
            <h2>Coding Tutorials</h2>
            <div id="tutorial-cards" class="resource-grid">
                <!-- Tutorial cards will be dynamically generated here -->
            </div>
        </section>

        <section id="resources">
            <h2>All Resources</h2>
            <div id="resource-cards" class="resource-grid">
                <!-- Resource cards will be dynamically generated here -->
            </div>
        </section>

        <section id="favorites">
            <h2>My Favorites</h2>
            <div id="favorite-cards" class="resource-grid">
                <p class="no-favorites">You have no favorite resources yet. Click the bookmark icon to add some!</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div class="social-links">
                <a href="https://github.com/Mellytech" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://wa.me/233531688968" aria-label="Whatsapp"><i class="fab fa-whatsapp"></i></a>
                 <a href="#" aria-label="Twitter"><i class="fab fa-linkedin"></i></a>
            </div>
            <p>&copy; <span id="current-year">2026</span> Developer Resource Hub. All Rights Reserved.<br><span class="developer-credit">Developed by MellyTech</span></p>
            <a href="#" id="back-to-top">Back to Top &uarr;</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
